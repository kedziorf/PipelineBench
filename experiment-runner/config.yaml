experiment:
  name: "local-sequential-cicd-benchmark"
  runs_per_tool: 5
  warmup_runs: 1
  timeout_seconds: 1800
  cleanup_between_runs: true
  cleanup_between_tools: true

cluster:
  type: "kind"
  name: "pipelinebench-local"
  namespace_prefix: "pipelinebench"

monitoring:
  prometheus_url: "http://localhost:9090"
  scrape_interval_seconds: 5
  metrics_window_seconds: 10

workload:
  name: "sample-app"
  path: "../workloads/sample-app"
  docker_image_name: "pipelinebench/sample-app"

gitea:
  namespace: "pipelinebench-gitea"
  external_url: "http://localhost:30082"
  internal_url: "http://gitea-http.pipelinebench-gitea.svc.cluster.local:3000"
  repository_owner: "filip"
  repository_name: "sample-app"
  username: "filip"

ci_systems:
  - name: "jenkins"
    enabled: true
    namespace: "pipelinebench-jenkins"
    metrics_namespaces:
      - "pipelinebench-jenkins"
    provider: "jenkins"
    deployment_method: "helm"
  - name: "tekton"
    enabled: true
    namespace: "pipelinebench-tekton"
    metrics_namespaces:
      - "tekton-pipelines"
      - "pipelinebench-tekton"
    provider: "tekton"
    deployment_method: "manifests"
  - name: "concourse"
    enabled: true
    namespace: "pipelinebench-concourse"
    metrics_namespaces:
      - "pipelinebench-concourse"
    provider: "concourse"
    deployment_method: "helm"
  - name: "gitea-actions"
    enabled: true
    namespace: "pipelinebench-gitea-actions"
    metrics_namespaces:
      - "pipelinebench-gitea-actions"
    provider: "gitea-actions"
    deployment_method: "gitea-act-runner"
  - name: "woodpecker"
    enabled: true
    namespace: "pipelinebench-woodpecker"
    metrics_namespaces:
      - "pipelinebench-woodpecker"
    provider: "woodpecker"
    deployment_method: "helm-kubernetes-backend"
    timeout_seconds: 300

results:
  output_dir: "../results"
  use_run_directories: true
  latest_alias: false
  export_csv: true
  export_json: true
  export_logs: true
