experiment:
  name: "local-sequential-cicd-benchmark"
  runs_per_tool: 5
  warmup_runs: 1
  timeout_seconds: 1800
  cleanup_between_runs: true
  cleanup_between_tools: true

cluster:
  type: "kind"
  name: "pipelinebench-local"
  namespace_prefix: "pipelinebench"

monitoring:
  prometheus_url: "http://localhost:9090"
  scrape_interval_seconds: 5
  metrics_window_seconds: 10

workload:
  name: "sample-app"
  path: "../workloads/sample-app"
  docker_image_name: "pipelinebench/sample-app"

ci_systems:
  - name: "jenkins"
    enabled: true
    namespace: "pipelinebench-jenkins"
    metrics_namespaces:
      - "pipelinebench-jenkins"
    provider: "jenkins"
    deployment_method: "helm"
  - name: "tekton"
    enabled: true
    namespace: "pipelinebench-tekton"
    metrics_namespaces:
      - "tekton-pipelines"
      - "pipelinebench-tekton"
    provider: "tekton"
    deployment_method: "manifests"
  - name: "circleci"
    enabled: true
    namespace: "pipelinebench-circleci"
    metrics_namespaces:
      - "pipelinebench-circleci"
    provider: "circleci"
    deployment_method: "local-kubernetes-job"

results:
  output_dir: "../results"
  use_run_directories: true
  latest_alias: false
  export_csv: true
  export_json: true
  export_logs: true
