grafana:
  enabled: true
  service:
    type: ClusterIP

prometheus:
  service:
    type: NodePort
    nodePort: 30090
  prometheusSpec:
    scrapeInterval: 5s
    evaluationInterval: 5s
    retention: 2d

kube-state-metrics:
  enabled: true

prometheus-node-exporter:
  enabled: true

alertmanager:
  enabled: false
