name: PipelineBench Sample App

on:
  push:
    branches:
      - main

jobs:
  sample-app:
    runs-on: ubuntu-latest
    env:
      SAMPLE_APP_DIR: /workspace/workloads/sample-app
      PIPELINEBENCH_REPO_ARCHIVE_URL: http://gitea-http.pipelinebench-gitea.svc.cluster.local:3000/filip/sample-app/archive/main.zip
      PIPELINEBENCH_OBSERVATION_HOLD_SECONDS: "20"
    steps:
      - name: Fetch source from local Gitea
        run: |
          python3 - <<'PY'
          import io
          import os
          import shutil
          import urllib.request
          import zipfile
          target = os.environ["SAMPLE_APP_DIR"]
          shutil.rmtree(target, ignore_errors=True)
          os.makedirs(target, exist_ok=True)
          with urllib.request.urlopen(os.environ["PIPELINEBENCH_REPO_ARCHIVE_URL"], timeout=30) as response:
              payload = response.read()
          with zipfile.ZipFile(io.BytesIO(payload)) as archive:
              prefix = archive.namelist()[0].split("/")[0] + "/"
              for member in archive.infolist():
                  if member.is_dir():
                      continue
                  rel = member.filename[len(prefix):]
                  if not rel:
                      continue
                  destination = os.path.join(target, rel)
                  os.makedirs(os.path.dirname(destination), exist_ok=True)
                  with archive.open(member) as source, open(destination, "wb") as output:
                      shutil.copyfileobj(source, output)
          PY
          find "${SAMPLE_APP_DIR}" -maxdepth 3 -type f | sort
      - name: Install dependencies
        run: python3 -m pip install --user -r "${SAMPLE_APP_DIR}/requirements.txt"
      - name: Unit tests
        run: PYTHONPATH="${SAMPLE_APP_DIR}" python3 -m unittest discover -s "${SAMPLE_APP_DIR}/tests"
      - name: CPU benchmark
        run: python3 "${SAMPLE_APP_DIR}/benchmark/cpu_task.py"
      - name: Memory benchmark
        run: python3 "${SAMPLE_APP_DIR}/benchmark/memory_task.py"
      - name: Docker build check
        run: |
          if command -v docker >/dev/null 2>&1; then
            docker build -t "pipelinebench/sample-app:gitea-actions-${RUN_ID:-0}" "${SAMPLE_APP_DIR}"
          else
            echo "Docker CLI is not available in this Gitea Actions job; skipping image build."
          fi
      - name: Observation hold
        run: sleep "${PIPELINEBENCH_OBSERVATION_HOLD_SECONDS}"
