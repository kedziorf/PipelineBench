version: 2.1

jobs:
  sample-app:
    docker:
      - image: cimg/python:3.12
    environment:
      SAMPLE_APP_DIR: /workspace/workloads/sample-app
    steps:
      - checkout
      - run:
          name: Prepare source
          command: |
            find "${SAMPLE_APP_DIR}" -maxdepth 3 -type f | sort
      - run:
          name: Install dependencies
          command: |
            python3 -m pip install --user -r "${SAMPLE_APP_DIR}/requirements.txt"
      - run:
          name: Unit tests
          command: |
            PYTHONPATH="${SAMPLE_APP_DIR}" python3 -m unittest discover -s "${SAMPLE_APP_DIR}/tests"
      - run:
          name: CPU benchmark
          command: |
            python3 "${SAMPLE_APP_DIR}/benchmark/cpu_task.py"
      - run:
          name: Memory benchmark
          command: |
            python3 "${SAMPLE_APP_DIR}/benchmark/memory_task.py"
      - run:
          name: Docker build check
          command: |
            if command -v docker >/dev/null 2>&1; then
              docker build -t "pipelinebench/sample-app:circleci-${RUN_ID:-0}" "${SAMPLE_APP_DIR}"
            else
              echo "Docker CLI is not available in the local CircleCI-compatible job; skipping image build."
            fi
      - run:
          name: Observation hold
          command: |
            sleep "${PIPELINEBENCH_OBSERVATION_HOLD_SECONDS:-20}"

workflows:
  sample-app:
    jobs:
      - sample-app
