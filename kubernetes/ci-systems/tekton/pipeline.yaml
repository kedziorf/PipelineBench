apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: pipelinebench-sample
  namespace: pipelinebench-tekton
spec:
  params:
    - name: run-id
      type: string
      default: "0"
  tasks:
    - name: unit-tests
      taskRef:
        name: pipelinebench-unit-tests
      params:
        - name: run-id
          value: "$(params.run-id)"
    - name: cpu-benchmark
      runAfter:
        - unit-tests
      taskRef:
        name: pipelinebench-cpu-benchmark
    - name: memory-benchmark
      runAfter:
        - cpu-benchmark
      taskRef:
        name: pipelinebench-memory-benchmark
    - name: docker-build-check
      runAfter:
        - memory-benchmark
      taskRef:
        name: pipelinebench-docker-build-check
      params:
        - name: run-id
          value: "$(params.run-id)"
---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: pipelinebench-unit-tests
  namespace: pipelinebench-tekton
spec:
  params:
    - name: run-id
      type: string
  steps:
    - name: tests
      image: python:3.12-slim
      env:
        - name: PIPELINEBENCH_REPO_ARCHIVE_URL
          value: http://gitea-http.pipelinebench-gitea.svc.cluster.local:3000/filip/sample-app/archive/main.zip
      script: |
        #!/usr/bin/env sh
        set -eu
        echo "PipelineBench Tekton unit test run $(params.run-id)"
        fetch_source() {
          python3 - <<'PY_FETCH'
        import io
        import os
        import shutil
        import urllib.request
        import zipfile

        target = "/workspace/workloads/sample-app"
        url = os.environ["PIPELINEBENCH_REPO_ARCHIVE_URL"]
        shutil.rmtree(target, ignore_errors=True)
        os.makedirs(target, exist_ok=True)
        with urllib.request.urlopen(url, timeout=30) as response:
            payload = response.read()
        with zipfile.ZipFile(io.BytesIO(payload)) as archive:
            prefix = archive.namelist()[0].split("/")[0] + "/"
            for member in archive.infolist():
                if member.is_dir():
                    continue
                rel = member.filename[len(prefix):]
                if not rel:
                    continue
                destination = os.path.join(target, rel)
                os.makedirs(os.path.dirname(destination), exist_ok=True)
                with archive.open(member) as source, open(destination, "wb") as output:
                    shutil.copyfileobj(source, output)
        PY_FETCH
        }
        fetch_source
        python3 -m pip install --user -r /workspace/workloads/sample-app/requirements.txt
        PYTHONPATH=/workspace/workloads/sample-app python3 -m unittest discover -s /workspace/workloads/sample-app/tests
---
