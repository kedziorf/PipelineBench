apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: pipelinebench-docker-build-check
  namespace: pipelinebench-tekton
spec:
  params:
    - name: run-id
      type: string
  steps:
    - name: docker-build-check
      image: python:3.12-slim
      env:
        - name: PIPELINEBENCH_REPO_ARCHIVE_URL
          value: http://gitea-http.pipelinebench-gitea.svc.cluster.local:3000/filip/sample-app/archive/main.zip
      script: |
        #!/usr/bin/env sh
        set -eu
        fetch_source() {
          python3 - <<'PY_FETCH'
        import io
        import os
        import shutil
        import urllib.request
        import zipfile

        target = "/workspace/workloads/sample-app"
        url = os.environ["PIPELINEBENCH_REPO_ARCHIVE_URL"]
        shutil.rmtree(target, ignore_errors=True)
        os.makedirs(target, exist_ok=True)
        with urllib.request.urlopen(url, timeout=30) as response:
            payload = response.read()
        with zipfile.ZipFile(io.BytesIO(payload)) as archive:
            prefix = archive.namelist()[0].split("/")[0] + "/"
            for member in archive.infolist():
                if member.is_dir():
                    continue
                rel = member.filename[len(prefix):]
                if not rel:
                    continue
                destination = os.path.join(target, rel)
                os.makedirs(os.path.dirname(destination), exist_ok=True)
                with archive.open(member) as source, open(destination, "wb") as output:
                    shutil.copyfileobj(source, output)
        PY_FETCH
        }
        fetch_source
        if command -v docker >/dev/null 2>&1; then
          docker build -t pipelinebench/sample-app:tekton-$(params.run-id) /workspace/workloads/sample-app
        else
          echo "Docker CLI is not available in this Tekton step; skipping image build."
        fi
