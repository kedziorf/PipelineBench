apiVersion: v1
kind: ConfigMap
metadata:
  name: pipelinebench-jenkinsfile
  namespace: pipelinebench-jenkins
data:
  Jenkinsfile: |
    pipeline {
      agent {
        kubernetes {
          defaultContainer 'python'
          yaml """
    apiVersion: v1
    kind: Pod
    metadata:
      labels:
        pipelinebench.io/workload: sample-app
    spec:
      serviceAccountName: pipelinebench-jenkins
      restartPolicy: Never
      containers:
        - name: python
          image: python:3.12-slim
          command:
            - cat
          tty: true
          volumeMounts:
            - name: sample-workload
              mountPath: /workspace/workloads/sample-app/requirements.txt
              subPath: requirements.txt
            - name: sample-workload
              mountPath: /workspace/workloads/sample-app/src/app.py
              subPath: app.py
            - name: sample-workload
              mountPath: /workspace/workloads/sample-app/tests/test_app.py
              subPath: test_app.py
            - name: sample-workload
              mountPath: /workspace/workloads/sample-app/benchmark/cpu_task.py
              subPath: cpu_task.py
            - name: sample-workload
              mountPath: /workspace/workloads/sample-app/benchmark/memory_task.py
              subPath: memory_task.py
            - name: sample-workload
              mountPath: /workspace/workloads/sample-app/Dockerfile
              subPath: Dockerfile
      volumes:
        - name: sample-workload
          configMap:
            name: pipelinebench-sample-workload
    """
        }
      }
      parameters {
        string(name: 'RUN_ID', defaultValue: '0', description: 'PipelineBench run id')
      }
      stages {
        stage('Checkout') {
          steps {
            echo "PipelineBench workload mounted from Kubernetes ConfigMap. RUN_ID=${params.RUN_ID}"
            sh 'find /workspace/workloads/sample-app -maxdepth 3 -type f | sort'
          }
        }
        stage('Install Dependencies') {
          steps {
            sh 'python3 -m pip install --user -r /workspace/workloads/sample-app/requirements.txt'
          }
        }
        stage('Unit Tests') {
          steps {
            sh 'PYTHONPATH=/workspace/workloads/sample-app python3 -m unittest discover -s /workspace/workloads/sample-app/tests'
          }
        }
        stage('CPU Task') {
          steps {
            sh 'python3 /workspace/workloads/sample-app/benchmark/cpu_task.py'
          }
        }
        stage('Memory Task') {
          steps {
            sh 'python3 /workspace/workloads/sample-app/benchmark/memory_task.py'
          }
        }
        stage('Docker Build') {
          steps {
            sh '''
              if command -v docker >/dev/null 2>&1; then
                docker build -t pipelinebench/sample-app:jenkins-${RUN_ID} /workspace/workloads/sample-app
              else
                echo "Docker CLI is not available in this Jenkins agent; skipping image build."
              fi
            '''
          }
        }
      }
      post {
        always {
          echo "PipelineBench run ${params.RUN_ID} finished with result ${currentBuild.currentResult}"
        }
      }
    }
